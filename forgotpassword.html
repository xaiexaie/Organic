<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>organic - Forgot Password</title>
<link rel="icon" type="image/png" href="Images/organ.png">
<link rel="stylesheet" href="design/style.css">
<script src="script.js" defer></script>
</head>
<body>

<main class="page-center">
  <div class="auth-box">
    <form id="forgotForm" class="auth-form active">

      <h2 class="title">Password Recovery</h2>
      <p class="sub">Reset your account password</p>

      <label>Email Address</label>
      <input type="email" id="forgotEmail">

      <button type="button" id="resetPasswordBtn" class="btn">Reset Password</button>

      <p class="link small" id="backLogin2" style="margin-top:10px;">Back to login</p>

      <div id="forgotNotification"></div>
    </form>
  </div>
</main>

</body>
</html>
